{{- if .Values.postgres.enabled }}
# Requires the CloudNativePG operator to be installed in the cluster. The
# operator generates the "<name>-app" secret (with a "uri" key) the app reads.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "bamboogrid.fullname" . }}-db
  labels:
    {{- include "bamboogrid.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgres.instances }}
  storage:
    size: {{ .Values.postgres.storage.size }}
    {{- with .Values.postgres.storage.storageClass }}
    storageClass: {{ . }}
    {{- end }}
  bootstrap:
    initdb:
      database: {{ .Values.postgres.database }}
      owner: {{ .Values.postgres.owner }}
{{- end }}
