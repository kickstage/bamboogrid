replicaCount: 2

image:
  repository: ghcr.io/kickstage/bamboogrid
  tag: "" # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Secrets for pulling a private ghcr image. Create one out-of-band, e.g.:
#   kubectl create secret docker-registry ghcr-pull \
#     --docker-server=ghcr.io --docker-username=<user> \
#     --docker-password=<PAT with read:packages> -n <namespace>
# then list it here: [{ name: ghcr-pull }]. Leave empty for a public package.
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000

# Rollout and graceful-shutdown tuning for uninterrupted (zero-downtime) deploys.
# maxUnavailable 0 keeps full capacity during a rollout; the preStop delay keeps
# a terminating pod serving until the ingress stops routing to it, which avoids
# the 502/Bad Gateway that otherwise appears mid-deploy.
deployment:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  # Must exceed preStopSleepSeconds so uvicorn still has time to drain in-flight
  # requests after the delay before the pod is force-killed.
  terminationGracePeriodSeconds: 35
  preStopSleepSeconds: 5

# Keeps at least one pod serving during voluntary disruptions (e.g. node drains).
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  maxUnavailable: ""

# With more than one replica a session is pinned to the pod that holds its live
# net via consistent hashing on the X-Session-Id header. This needs the ingress
# enabled and an nginx ingress controller; requests without the header (session
# creation, share open, health) fall back to round-robin.
ingress:
  enabled: true
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/upstream-hash-by: "$http_x_session_id"
    # Kept above the app's 16 MiB import cap (MAX_IMPORT_BYTES) so oversized
    # uploads are rejected by the app with a readable JSON message rather than by
    # nginx with its generic HTML 413 page.
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
  hosts:
    - host: bamboogrid.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Sessions are stored in a shared PostgreSQL database, provisioned here as a
# CloudNativePG Cluster (the cnpg operator must be installed in the cluster).
# Disable to bring your own database via the `database` block below.
postgres:
  enabled: true
  instances: 2
  storage:
    size: 5Gi
    storageClass: "" # "" uses the cluster default StorageClass
  database: bamboogrid
  owner: bamboogrid

# Connection secret the app reads as DATABASE_URL. Defaults to the cnpg-generated
# "<fullname>-db-app" secret; set name to point at an external database secret.
database:
  urlSecret:
    name: ""
    key: uri

session:
  # Idle time before a session is purged from the database (seconds). 30 days.
  # Quoted so Helm doesn't render it in scientific notation.
  ttlSeconds: "2592000"

# OpenTelemetry tracing. When enabled, the backend exports spans to the OTLP
# (HTTP) endpoint; the path suffix (/v1/traces) is added automatically.
tracing:
  enabled: false
  endpoint: "http://otel-collector:4318"
  serviceName: bamboogrid-backend

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
