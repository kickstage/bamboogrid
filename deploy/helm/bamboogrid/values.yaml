replicaCount: 1

image:
  repository: ghcr.io/kickstage/bamboogrid
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Secrets for pulling a private ghcr image. Create one out-of-band, e.g.:
#   kubectl create secret docker-registry ghcr-pull \
#     --docker-server=ghcr.io --docker-username=<user> \
#     --docker-password=<PAT with read:packages> -n <namespace>
# then list it here: [{ name: ghcr-pull }]. Leave empty for a public package.
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: bamboogrid.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
