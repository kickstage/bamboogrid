replicaCount: 1

image:
  repository: ghcr.io/kickstage/bamboogrid
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

# Secrets for pulling a private ghcr image. Create one out-of-band, e.g.:
#   kubectl create secret docker-registry ghcr-pull \
#     --docker-server=ghcr.io --docker-username=<user> \
#     --docker-password=<PAT with read:packages> -n <namespace>
# then list it here: [{ name: ghcr-pull }]. Leave empty for a public package.
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: bamboogrid.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Sessions are held in an SQLite database on a persistent volume so they survive
# pod restarts. SQLite is a single writer, so keep replicaCount at 1.
persistence:
  enabled: true
  storageClass: ""  # "" uses the cluster default StorageClass
  accessModes:
    - ReadWriteOnce
  size: 1Gi

session:
  # Idle time before a session is purged from the database (seconds). 30 days.
  # Quoted so Helm doesn't render it in scientific notation.
  ttlSeconds: "2592000"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  # Group-own the mounted volume so the non-root user can write the database.
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
